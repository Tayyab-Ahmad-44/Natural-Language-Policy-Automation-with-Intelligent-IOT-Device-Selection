      device: Hydraulic Press
      capability: Emergency Stop
      args: {}
      dependencies: []
      condition: null
      on_failure: halt_branch
    - id: n2
      device: Conveyor Belt
      capability: Stop
      args: {}
      dependencies: []
      condition: null
      on_failure: halt_branch
    - id: n3
      device: Emergency Siren
      capability: Alert
      args: {level: critical}
      dependencies: []
      condition: null
      on_failure: halt_branch
    - id: n4
      device: Warning Light
      capability: Flash
      args: {color: red, duration: 120}
      dependencies: []
      condition: null
      on_failure: halt_branch
