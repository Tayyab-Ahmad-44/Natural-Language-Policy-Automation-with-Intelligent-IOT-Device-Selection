id: factory_emergency_shutdown
nl: "Immediately perform an emergency stop on the hydraulic press, stop the conveyor belt, trigger the emergency siren at 'critical' level, and flash the warning light red for 120 seconds."
tags: [multi_node, parallel]
catalog: factory
expected_dag:
  nodes:
