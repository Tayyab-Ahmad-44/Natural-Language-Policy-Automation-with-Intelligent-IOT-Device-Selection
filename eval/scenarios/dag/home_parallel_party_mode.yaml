# Source: comprehensive_scenarios.md, Smart Home task 3 "Party Mode".
# Mirrors the fan-out + one sequential pair pattern from llm.py's own EXAMPLE 1
# (Play Music -> Set Volume), giving the LLM a shape it's been shown before.
id: home_parallel_party_mode
nl: "At 8:00 PM, set the living room light color to '#FF00FF', dim lights to 70%, play 'Party Hits' on the smart speaker at volume 80, and set the thermostat fan to 'on'."
tags: [multi_node, parallel, scheduled]
catalog: home
expected_dag:
  nodes:
    - id: n1
      device: Living Room Light
      capability: Set Color
      args: {hex: "#FF00FF"}
      dependencies: []
      condition: null
      on_failure: ignore
    - id: n2
      device: Living Room Light
      capability: Dim
      args: {percentage: 70}
      dependencies: []
      condition: null
      on_failure: ignore
    - id: n3
      device: Smart Speaker
      capability: Play Music
      args: {playlist: "Party Hits"}
      dependencies: []
      condition: null
      on_failure: ignore
    - id: n4
      device: Smart Speaker
      capability: Set Volume
      args: {level: 80}
      dependencies: [n3]
      condition: {type: on_success}
      on_failure: ignore
    - id: n5
      device: Thermostat
      capability: Fan Control
      args: {state: "on"}
      dependencies: []
      condition: null
      on_failure: ignore
